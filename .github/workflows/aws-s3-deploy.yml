name: Deploy to S3

on:
  push:
    branches: [production]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          # Full history so scripts/generate_deployment_index.py can read git log
          # for this branch back to repo inception.
          fetch-depth: 0
          # Persist GITHUB_TOKEN so the regenerate step can push back.
          persist-credentials: true

      # ──────────────────────────────────────────────────────────────────────
      # Regenerate Deployment Index for THIS branch from git log, then commit
      # back with [skip ci] so the next deploy doesn't loop. Runs before the
      # build/deploy steps so the freshly-regenerated HTML is what gets synced
      # to S3 on this same workflow run.
      # ──────────────────────────────────────────────────────────────────────
      - name: Regenerate Deployment Index (production)
        run: |
          python3 scripts/generate_deployment_index.py \
            --branch production \
            --out pages/development/deployment-index/production/index.html
          if git diff --quiet pages/development/deployment-index/production/index.html; then
            echo "No changes to Deployment Index — skipping commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add pages/development/deployment-index/production/index.html
            git commit -m "Auto-regenerate Deployment Index (production) [skip ci]"
            git push origin HEAD:production
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build webpack bundle
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Deploy HTML files to S3 with no-cache
        run: |
          aws s3 sync . s3://tnjdynamicsite --delete --exclude "*" --include "*.html" --cache-control="no-cache,no-store,must-revalidate" --content-type="text/html"

      - name: Deploy JavaScript files to S3 with no-cache
        run: |
          aws s3 sync . s3://tnjdynamicsite --exclude "*" --include "*.js" --cache-control="no-cache,no-store,must-revalidate" --content-type="application/javascript"

      - name: Deploy dist folder to S3 with no-cache
        run: |
          aws s3 sync dist/ s3://tnjdynamicsite/dist/ --cache-control="no-cache,no-store,must-revalidate" --content-type="application/javascript"

      - name: Deploy remaining files to S3
        run: |
          aws s3 sync . s3://tnjdynamicsite --delete --exclude ".git*" --exclude ".github*" --exclude "*.html" --exclude "*.js" --exclude "node_modules/*" --exclude "dist/*"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id E26XILFQZ1UE5P --paths "/*"
