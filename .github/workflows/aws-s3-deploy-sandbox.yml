name: Deploy Sandbox to S3

on:
  push:
    branches: [sandbox]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          # Full history so scripts/generate_deployment_index.py can read git log
          # for this branch back to repo inception.
          fetch-depth: 0
          # Persist GITHUB_TOKEN so the regenerate step can push back.
          persist-credentials: true

      # ──────────────────────────────────────────────────────────────────────
      # Generate Deployment Index JSON from git log. Deployed to S3 only.
      # ──────────────────────────────────────────────────────────────────────
      # Fetch all remote branches so generate_deployment_index.py can
      # run git log against development and production too.
      - name: Fetch all branches
        run: git fetch --no-tags origin +refs/heads/*:refs/remotes/origin/*

      - name: Generate Deployment Index JSON (all environments)
        run: |
          python3 scripts/generate_deployment_index.py \
            --branch origin/development \
            --out pages/development/deployment-index/development/index.html \
            --json-out pages/development/deployment-index/development/index.json
          python3 scripts/generate_deployment_index.py \
            --branch sandbox \
            --out pages/development/deployment-index/sandbox/index.html \
            --json-out pages/development/deployment-index/sandbox/index.json
          python3 scripts/generate_deployment_index.py \
            --branch origin/production \
            --out pages/development/deployment-index/production/index.html \
            --json-out pages/development/deployment-index/production/index.json

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build webpack bundle
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.SANDBOX_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.SANDBOX_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Deploy HTML files to S3 with no-cache
        run: |
          aws s3 sync . s3://tnjdynamicsite-sandbox --delete --exclude "*" --include "*.html" --cache-control="no-cache,no-store,must-revalidate" --content-type="text/html"

      - name: Deploy JavaScript files to S3 with no-cache
        run: |
          aws s3 sync . s3://tnjdynamicsite-sandbox --exclude "*" --include "*.js" --cache-control="no-cache,no-store,must-revalidate" --content-type="application/javascript"

      - name: Deploy dist folder to S3 with no-cache
        run: |
          aws s3 sync dist/ s3://tnjdynamicsite-sandbox/dist/ --cache-control="no-cache,no-store,must-revalidate" --content-type="application/javascript"

      - name: Deploy JSON files to S3 with no-cache (version.json + deployment index)
        run: |
          aws s3 cp version.json s3://tnjdynamicsite-sandbox/version.json --cache-control="no-cache,no-store,must-revalidate" --content-type="application/json"
          aws s3 sync pages/development/deployment-index/ s3://tnjdynamicsite-sandbox/pages/development/deployment-index/ --exclude "*" --include "*.json" --cache-control="no-cache,no-store,must-revalidate" --content-type="application/json"

      - name: Deploy remaining files to S3
        run: |
          aws s3 sync . s3://tnjdynamicsite-sandbox --delete --exclude ".git*" --exclude ".github*" --exclude "*.html" --exclude "*.js" --exclude "*.json" --exclude "node_modules/*" --exclude "dist/*"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id E28F8S6UWTY5P2 --paths "/*"
