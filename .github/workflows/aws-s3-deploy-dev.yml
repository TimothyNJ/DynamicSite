name: Deploy Development to S3

on:
  push:
    branches: [development]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          # Full history so scripts/generate_deployment_index.py can read git log
          # for this branch back to repo inception.
          fetch-depth: 0
          # Persist GITHUB_TOKEN so the regenerate step can push back.
          persist-credentials: true

      # ──────────────────────────────────────────────────────────────────────
      # Regenerate Deployment Index for THIS branch from git log, then commit
      # back with [skip ci] so the next deploy doesn't loop. Runs before the
      # build/deploy steps so the freshly-regenerated HTML is what gets synced
      # to S3 on this same workflow run.
      # ──────────────────────────────────────────────────────────────────────
      - name: Regenerate Deployment Index (development)
        run: |
          python3 scripts/generate_deployment_index.py \
            --branch development \
            --out pages/development/deployment-index/development/index.html
          if git diff --quiet pages/development/deployment-index/development/index.html; then
            echo "No changes to Deployment Index — skipping commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add pages/development/deployment-index/development/index.html
            git commit -m "Auto-regenerate Deployment Index (development) [skip ci]"
            git push origin HEAD:development
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build webpack bundle
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.DEV_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.DEV_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Deploy HTML files to S3 with no-cache
        run: |
          aws s3 sync . s3://tnjdynamicsite-dev --delete --exclude "*" --include "*.html" --cache-control="no-cache,no-store,must-revalidate" --content-type="text/html"

      - name: Deploy JavaScript files to S3 with no-cache
        run: |
          aws s3 sync . s3://tnjdynamicsite-dev --exclude "*" --include "*.js" --cache-control="no-cache,no-store,must-revalidate" --content-type="application/javascript"

      - name: Deploy dist folder to S3 with no-cache
        run: |
          aws s3 sync dist/ s3://tnjdynamicsite-dev/dist/ --cache-control="no-cache,no-store,must-revalidate" --content-type="application/javascript"

      - name: Deploy version.json to S3 with no-cache
        run: |
          aws s3 cp version.json s3://tnjdynamicsite-dev/version.json --cache-control="no-cache,no-store,must-revalidate" --content-type="application/json"

      - name: Deploy remaining files to S3
        run: |
          aws s3 sync . s3://tnjdynamicsite-dev --delete --exclude ".git*" --exclude ".github*" --exclude "*.html" --exclude "*.js" --exclude "*.json" --exclude "node_modules/*" --exclude "dist/*"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id E3OWX0O17FJNHI --paths "/*"

      - name: Check if Lambda code changed
        id: lambda-check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^lambda/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Lambda (Zitadel API proxy)
        if: steps.lambda-check.outputs.changed == 'true'
        run: |
          cd lambda/zitadel-proxy
          pip install --target ./package "PyJWT[crypto]" --platform manylinux2014_x86_64 --implementation cp --python-version 3.12 --only-binary=:all:
          cd package && zip -r9 ../function.zip . && cd ..
          zip -g function.zip lambda_function.py
          aws lambda update-function-code --function-name dynamicsite-zitadel-proxy --zip-file fileb://function.zip --region us-west-2
