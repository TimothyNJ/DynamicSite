<!--
  Address Validations — Phase 1
  Minimal country selector + libaddressinput-driven field rendering.
  Later phases will add Google Places Autocomplete, Google AV, and manual review.
-->
<div class="address-validator">
  <div class="address-validator__title">
    <h2>Address Validations</h2>
  </div>

  <div class="address-validator__country-row">
    <!-- Country picker — list_floating_label_component_engine renders here.
         Combobox: type to filter, click or Enter to select. The engine
         provides its own floating label, so the visible-label and
         <select> markup the prior phase used are no longer needed. -->
    <div id="address-country-container"></div>
  </div>

  <div class="address-validator__fields" id="address-fields-container" aria-live="polite">
    <p class="address-validator__hint">Select a country above to see the correct address fields for that country.</p>
  </div>
</div>
