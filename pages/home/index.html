<!-- Font-size calibration testers: MIN | LIVE | PREF for each tier.
     LEFT cell forces the floor value of the tier's clamp().
     CENTER cell uses the real tag so it renders whatever the clamp resolves to
       at the current viewport — this is "LIVE".
     RIGHT cell forces the preferred (vw) value, unclamped.
     On phone: expect MIN == LIVE (MIN is winning).
     On MBP/TV: expect LIVE == PREF (vw is winning).
     Remove this whole block when the experiment is done. -->
<div style="display: flex; flex-direction: column; gap: 0.8em; align-items: center; padding: 0.5em 0; color: #ffffff; font-family: var(--font-family-primary);">

  <!-- Each tier is a 3-col x 2-row grid.
       Row 1 = samples (baseline-aligned via align-items: baseline).
       Row 2 = labels.
       Samples are direct grid items (no wrapper div) so every cell's
       baseline is computed from its own text, not from a container. -->

  <!-- h1 row -->
  <div style="display: grid; grid-template-columns: repeat(3, auto); column-gap: 1.5em; row-gap: 0.1em; justify-items: center; align-items: baseline;">
    <span style="font-size: 1.125rem; font-weight: bold;">H1</span>
    <h1 style="margin: 0;">H1</h1>
    <span style="font-size: 1.1vw; font-weight: bold;">H1</span>
    <div style="font-size: 10px; opacity: 0.6;">MIN 1.125rem</div>
    <div style="font-size: 10px; opacity: 0.6;">LIVE</div>
    <div style="font-size: 10px; opacity: 0.6;">PREF 1.1vw</div>
  </div>

  <!-- h2 row -->
  <div style="display: grid; grid-template-columns: repeat(3, auto); column-gap: 1.5em; row-gap: 0.1em; justify-items: center; align-items: baseline;">
    <span style="font-size: 0.875rem; font-weight: bold;">H2</span>
    <h2 style="margin: 0;">H2</h2>
    <span style="font-size: 0.95vw; font-weight: bold;">H2</span>
    <div style="font-size: 10px; opacity: 0.6;">MIN 0.875rem</div>
    <div style="font-size: 10px; opacity: 0.6;">LIVE</div>
    <div style="font-size: 10px; opacity: 0.6;">PREF 0.95vw</div>
  </div>

  <!-- h3 row -->
  <div style="display: grid; grid-template-columns: repeat(3, auto); column-gap: 1.5em; row-gap: 0.1em; justify-items: center; align-items: baseline;">
    <span style="font-size: 0.7rem; font-weight: bold;">H3</span>
    <h3 style="margin: 0;">H3</h3>
    <span style="font-size: 0.8vw; font-weight: bold;">H3</span>
    <div style="font-size: 10px; opacity: 0.6;">MIN 0.7rem</div>
    <div style="font-size: 10px; opacity: 0.6;">LIVE</div>
    <div style="font-size: 10px; opacity: 0.6;">PREF 0.8vw</div>
  </div>

  <!-- h4 row -->
  <div style="display: grid; grid-template-columns: repeat(3, auto); column-gap: 1.5em; row-gap: 0.1em; justify-items: center; align-items: baseline;">
    <span style="font-size: 0.6rem;">H4</span>
    <h4 style="margin: 0;">H4</h4>
    <span style="font-size: 0.75vw;">H4</span>
    <div style="font-size: 10px; opacity: 0.6;">MIN 0.6rem</div>
    <div style="font-size: 10px; opacity: 0.6;">LIVE</div>
    <div style="font-size: 10px; opacity: 0.6;">PREF 0.75vw</div>
  </div>

  <!-- p row -->
  <div style="display: grid; grid-template-columns: repeat(3, auto); column-gap: 1.5em; row-gap: 0.1em; justify-items: center; align-items: baseline;">
    <span style="font-size: 0.5rem;">P</span>
    <p style="margin: 0;">P</p>
    <span style="font-size: 0.7vw;">P</span>
    <div style="font-size: 10px; opacity: 0.6;">MIN 0.5rem</div>
    <div style="font-size: 10px; opacity: 0.6;">LIVE</div>
    <div style="font-size: 10px; opacity: 0.6;">PREF 0.7vw</div>
  </div>

  <!-- Browser minimum-font-size probe: if any of these render bigger than
       specified, the browser is enforcing a floor of its own. -->
  <div style="display: flex; align-items: center; justify-content: center; gap: 1.5em; margin-top: 1em; padding-top: 0.8em; border-top: 1px dashed rgba(255,255,255,0.3);">
    <div style="text-align: center;">
      <span style="font-size: 4px;">probe</span>
      <div style="font-size: 10px; opacity: 0.6;">4px forced</div>
    </div>
    <div style="text-align: center;">
      <span style="font-size: 6px;">probe</span>
      <div style="font-size: 10px; opacity: 0.6;">6px forced</div>
    </div>
    <div style="text-align: center;">
      <span style="font-size: 8px;">probe</span>
      <div style="font-size: 10px; opacity: 0.6;">8px forced</div>
    </div>
  </div>

</div>

<div class="dimension-container">
  <p id="home-dimensions"></p>
</div>
