<div class="user-mgmt-outer">
  <div class="user-mgmt-container">
    <div class="user-mgmt-title">
      <h1>User Management</h1>
    </div>
    <div class="user-mgmt-controls">
      <div class="user-mgmt-controls-left">
        <div class="user-mgmt-search-container">
          <input
            type="text"
            class="user-mgmt-search-input"
            id="user-mgmt-search"
            placeholder="Search users..."
          />
        </div>
      </div>
      <div class="user-mgmt-controls-center">
        <!-- Spacer for centre alignment -->
      </div>
      <div class="user-mgmt-controls-right">
        <div class="user-mgmt-toggle-container">
          <button class="user-mgmt-toggle-button active" id="user-mgmt-view-toggle">
            <h3>View</h3>
          </button>
          <button class="user-mgmt-toggle-button" id="user-mgmt-edit-toggle">
            <h3>Edit</h3>
          </button>
        </div>
        <button class="user-mgmt-control-button" id="user-mgmt-add-user-btn">
          <h3>Add User</h3>
        </button>
        <button class="user-mgmt-control-button" id="user-mgmt-import-users-btn">
          <h3>Import Users</h3>
        </button>
      </div>
    </div>
    <div class="user-mgmt-table-wrap">
      <table class="user-mgmt-table" id="user-mgmt-table">
        <thead>
          <tr>
            <th>
              <div class="user-mgmt-header-container">
                <div class="user-mgmt-rotated-header"><h2>Name</h2></div>
              </div>
            </th>
            <th>
              <div class="user-mgmt-header-container">
                <div class="user-mgmt-rotated-header"><h2>Email</h2></div>
              </div>
            </th>
            <th>
              <div class="user-mgmt-header-container">
                <div class="user-mgmt-rotated-header"><h2>End User</h2></div>
              </div>
            </th>
            <th>
              <div class="user-mgmt-header-container">
                <div class="user-mgmt-rotated-header"><h2>Admin User</h2></div>
              </div>
            </th>
            <th class="user-mgmt-admin-column">
              <div class="user-mgmt-header-container">
                <div class="user-mgmt-rotated-header"><h2>Issue Identifier</h2></div>
              </div>
            </th>
            <th class="user-mgmt-admin-column">
              <div class="user-mgmt-header-container">
                <div class="user-mgmt-rotated-header"><h2>Onboarding</h2></div>
              </div>
            </th>
            <th class="user-mgmt-admin-column user-mgmt-short-header">
              <div class="user-mgmt-header-container">
                <div class="user-mgmt-rotated-header"><h2>AP</h2></div>
              </div>
            </th>
            <th class="user-mgmt-admin-column">
              <div class="user-mgmt-header-container">
                <div class="user-mgmt-rotated-header"><h2>Approver 1</h2></div>
              </div>
            </th>
            <th class="user-mgmt-admin-column">
              <div class="user-mgmt-header-container">
                <div class="user-mgmt-rotated-header"><h2>Approver 2</h2></div>
              </div>
            </th>
            <th class="user-mgmt-admin-column">
              <div class="user-mgmt-header-container">
                <div class="user-mgmt-rotated-header"><h2>Vendor Master</h2></div>
              </div>
            </th>
          </tr>
        </thead>
        <tbody>
          <!-- Rows populated by user-management-table.js -->
        </tbody>
      </table>
    </div>
  </div>
</div>
