  <!-- Water simulation controls -->
  <div class="water-controls">
    <h2>Water Controls</h2>

    <div class="water-control-row">
      <h3>Mouse Size</h3>
      <div id="water-mouse-size-slider-container"></div>

    <div class="water-control-row">
      <h3>Mouse Depth</h3>
